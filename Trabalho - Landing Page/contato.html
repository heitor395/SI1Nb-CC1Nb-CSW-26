<body>

    <nav>
        <a href="index.html">Início</a>

        <a href="github.html">GitHub</a>

    <div class="caixa-conteudo">
        <h1>Solicite um Orçamento</h1>
        <p style="text-align: center;">Preencha o formulário abaixo e receba uma proposta personalizada para o seu projeto em até 24 horas.</p>

        <form action="#" method="post" class="form-contato">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome..." required>

            <label for="tel">Telefone / WhatsApp:</label>
            <input type="tel" id="tel" name="tel" placeholder="(27) 99999-9999" required style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px;">

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>

            <label>Tipo de Contratante:</label>
            <div style="margin: 10px 0;">
                <input type="radio" name="perfil" value="pf" id="pf" checked style="width: auto;"> 
                <label for="pf" style="display: inline; font-weight: normal; margin-right: 20px;">Pessoa Física</label>
                
                <input type="radio" name="perfil" value="pj" id="pj" style="width: auto;"> 
                <label for="pj" style="display: inline; font-weight: normal;">Pessoa Jurídica</label>
            </div>

            <label for="servico">Que tipo de site você precisa?</label>
            <select id="servico" name="servico">
                <option value="">Selecione...</option>
                <option value="estatico">Site estático (1–2 páginas)</option>
                <option value="institucional">Site institucional (3–5 páginas)</option>
                <option value="dinamico">Site dinâmico</option>
                <option value="avancado">Site avançado</option>
            </select>

            <label>Melhor horário para contato:</label>
            <div style="margin: 10px 0;">
                <input type="checkbox" name="hora" value="manha"> Manhã
                <input type="checkbox" name="hora" value="tarde"> Tarde
                <input type="checkbox" name="hora" value="noite"> Noite
            </div>

            <label for="mensagem">Descreva seu projeto:</label>
            <textarea id="mensagem" name="mensagem" rows="5" placeholder="Conte um pouco sobre o que você precisa..."></textarea>

            <button type="submit">Enviar</button>

        </form>
    </div>

</body>
</html>
